[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
]

[rpc_endpoints]
xlayer   = "${XLAYER_RPC_URL}"
arbitrum = "${EXEC_CHAIN_RPC_URL}"

[etherscan]
xlayer   = { key = "placeholder", url = "https://www.oklink.com/api/v5/explorer/xlayer" }
arbitrum = { key = "${ARBISCAN_API_KEY}", url = "https://api.arbiscan.io/api" }
